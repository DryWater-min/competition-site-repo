<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOTC - Register</title>
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-inner">
        <!-- ЛЕВАЯ - картинка -->
        <div class="auth-left">
          <img
            src="./imgs/d703064a3964ba217a784d145ec31cf171c822ca.jpg"
            alt=""
          />
          <div class="auth-left-text">
            <h3>TOTCd is simply</h3>
            <p>Study Online</p>
          </div>
        </div>

        <!-- ПРАВАЯ - форма -->
        <div class="auth-right">
          <p class="auth-welcome">Welcome to lorem.!</p>

          <!-- Переключатель -->
          <div class="auth-tabs">
            <a href="./login.html">Login</a>
            <a href="./signup.html" class="active">Sign up</a>
          </div>

          <p class="auth-desc">
            Here u can Sign Up and contunie Study Online
          </p>

          <div class="auth-field">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your Email Address" />
          </div>

          <div class="auth-field">
            <label>User name</label>
            <input type="text" placeholder="Enter your user name" />
          </div>

          <div class="auth-field">
            <label>Password</label>
            <input type="password" placeholder="Enter your Password" />
          </div>

          <a href="./index.html">
            <button class="btn-auth">Sign up</button>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
