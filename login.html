<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOTC - Login</title>
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-inner">
        <!-- ЛЕВАЯ - картинка -->
        <div class="auth-left">
          <img
            src="./imgs/3d2212c26d48440cd871897408ac64c61604bb17.jpg"
            alt=""
          />
          <div class="auth-left-text">
            <h3>TOTC is simply</h3>
            <p>Study Online</p>
          </div>
        </div>

        <!-- ПРАВАЯ - форма -->
        <div class="auth-right">
          <p class="auth-welcome">Welcome to lorem.!</p>

          <!-- Переключатель -->
          <div class="auth-tabs">
            <a href="./login.html" class="active">Login</a>
            <a href="./signup.html">Sign Up</a>
          </div>

          <p class="auth-desc">Here u can login and contunie Study Online</p>

          <div class="auth-field">
            <label>User name</label>
            <input type="text" placeholder="Enter your user name" />
          </div>

          <div class="auth-field">
            <label>Password</label>
            <input type="password" placeholder="Enter your Password" />
          </div>
          <a href="./index.html">
            <button class="btn-auth">Login</button>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
